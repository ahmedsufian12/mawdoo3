name: Scrape Mawdoo3 Posts

on:
  schedule:
    - cron: '0 3 * * *'      # كل يوم الساعة 3 صباحاً بتوقيت UTC (6 صباحاً بتوقيت القاهرة/عمان)
  workflow_dispatch:         # يمكن تشغيله يدوياً

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run Scraper
        run: python scrape_mawdoo3.py

      - name: Commit & Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add output.json
          if git diff --cached --quiet; then
            echo "✅ No changes to commit"
          else
            git commit -m "📊 Update scraped data from mawdoo3.com - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
