name: Scrape Mawdoo3 Full (CSV Version)

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run Scraper
        run: python scrape_mawdoo3.py

      - name: Commit & Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          
          # 🌟 التعديل هنا: إضافة ملف الـ CSV بدلاً من الـ JSON
          git add output.csv
          
          # التحقق من وجود تغييرات في ملف الـ CSV
          if git diff --cached --quiet; then
            echo "✅ No changes to commit"
          else
            git commit -m "📊 Full scrape CSV update - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
